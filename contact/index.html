<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Sujal Sirimilla</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <script type="module" src="../global.js"></script>

    <h1>Contact</h1>
    <form action="mailto:ssirimilla@ucsd.edu" method="POST" enctype="text/plain">

    <label>
        Your email:
        <input type="email" name="email" required>
    </label>

    <label>
        Subject:
        <input name="subject">
    </label>

    <label>
        Message:
        <textarea name="body" rows="5"></textarea>
    </label>

    <button>Send</button>

    </form>

</body>
</html>
